{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DjanGoMarket{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-cart-fill me-2" style="color: #8bda4b;"></i>DjanGoMarket
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navCollapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'supermarket_list' %}active{% endif %}" href="{% url 'supermarket_list' %}">Supermarkets</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'employee_list' %}active{% endif %}" href="{% url 'employee_list' %}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}" href="{% url 'product_list' %}">Products</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'warehouse_list' %}active{% endif %}" href="{% url 'warehouse_list' %}">Warehouses</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'purchase_list' %}active{% endif %}" href="{% url 'purchase_list' %}">Purchases</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'order_list' %}active{% endif %}" href="{% url 'order_list' %}">Orders</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle {% if request.resolver_match.url_name in 'section_list distributor_list client_list' %}active{% endif %}" href="#" data-bs-toggle="dropdown">More</a>
                        <ul class="dropdown-menu border-0 shadow-sm mt-2">
                            <li><a class="dropdown-item py-2 {% if request.resolver_match.url_name == 'section_list' %}fw-bold bg-light{% endif %}" href="{% url 'section_list' %}">Sections</a></li>
                            <li><a class="dropdown-item py-2 {% if request.resolver_match.url_name == 'distributor_list' %}fw-bold bg-light{% endif %}" href="{% url 'distributor_list' %}">Distributors</a></li>
                            <li><a class="dropdown-item py-2 {% if request.resolver_match.url_name == 'client_list' %}fw-bold bg-light{% endif %}" href="{% url 'client_list' %}">Clients</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'scripts.js' %}"></script>
</body>
</html>
