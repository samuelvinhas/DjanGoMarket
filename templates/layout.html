<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DjanGoMarket{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f8; color: #333; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .navbar { background-color: #0c3324 !important; padding: 1rem 0; border-bottom: 3px solid #8bda4b; }
        .navbar-brand { color: #f8f9fa !important; font-weight: 700; letter-spacing: 0.5px; }
        .nav-link { color: rgba(255, 255, 255, 0.8) !important; font-weight: 500; transition: color 0.2s; }
        .nav-link:hover { color: #fff !important; }
        .nav-link.active { font-weight: 700; opacity: 1; color: #8bda4b !important; position: relative; }
        .nav-link.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background-color: #8bda4b; border-radius: 2px; }

        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.04); margin-bottom: 30px; }
        .card-header { background-color: white; border-bottom: 2px solid #f1f3f5; padding: 1.5rem 1.5rem 1rem; border-radius: 12px 12px 0 0 !important; }
        .card-header h3 { margin: 0; font-weight: 600; color: #1a1e21; font-size: 1.25rem; }
        .table { margin-bottom: 0; }
        .table th { background-color: transparent !important; color: #6c757d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f1f3f5; padding: 1rem 1.5rem; font-weight: 600; }
        .table td { padding: 1rem 1.5rem; vertical-align: middle; border-bottom: 1px solid #f1f3f5; color: #495057; font-size: 0.95rem; }
        .table tbody tr:last-child td { border-bottom: none; }
        .table tbody tr:hover { background-color: #f8f9fa; }
        .badge { font-weight: 500; padding: 0.5em 0.75em; border-radius: 6px; }
        .main-content { padding-top: 40px; padding-bottom: 60px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-cart-fill me-2" style="color: #8bda4b;"></i>DjanGoMarket
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navCollapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'supermarket_list' %}active{% endif %}" href="{% url 'supermarket_list' %}">Supermarkets</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'employee_list' %}active{% endif %}" href="{% url 'employee_list' %}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}" href="{% url 'product_list' %}">Products</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'warehouse_list' %}active{% endif %}" href="{% url 'warehouse_list' %}">Warehouses</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'purchase_list' %}active{% endif %}" href="{% url 'purchase_list' %}">Purchases</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'order_list' %}active{% endif %}" href="{% url 'order_list' %}">Orders</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle {% if request.resolver_match.url_name in 'section_list distributor_list client_list' %}active{% endif %}" href="#" data-bs-toggle="dropdown">More</a>
                        <ul class="dropdown-menu border-0 shadow-sm mt-2">
                            <li><a class="dropdown-item py-2 {% if request.resolver_match.url_name == 'section_list' %}fw-bold bg-light{% endif %}" href="{% url 'section_list' %}">Sections</a></li>
                            <li><a class="dropdown-item py-2 {% if request.resolver_match.url_name == 'distributor_list' %}fw-bold bg-light{% endif %}" href="{% url 'distributor_list' %}">Distributors</a></li>
                            <li><a class="dropdown-item py-2 {% if request.resolver_match.url_name == 'client_list' %}fw-bold bg-light{% endif %}" href="{% url 'client_list' %}">Clients</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
