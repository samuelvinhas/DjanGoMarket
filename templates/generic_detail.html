{% extends 'layout.html' %}
{% block title %}{{ title }} - DjanGoMarket{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <h2 class="fw-bold mb-0 text-dark"><i class="bi {{ icon }} text-muted me-2" style="font-size: 1.5rem;"></i>{{ title }}</h2>
            <a href="{% url list_url %}" class="btn btn-outline-secondary rounded-pill px-3 fw-medium">
                <i class="bi bi-arrow-left me-1"></i>Back to list
            </a>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                {% for label, value in fields.items %}
                <div class="row g-0 border-bottom border-light mx-0">
                    <div class="col-sm-4 px-4 py-3 bg-light bg-opacity-50 text-muted small text-uppercase fw-semibold align-self-stretch d-flex align-items-center">{{ label }}</div>
                    <div class="col-sm-8 px-4 py-3 text-dark">{{ value|linebreaks }}</div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
