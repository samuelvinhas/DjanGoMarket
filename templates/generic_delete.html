{% extends 'layout.html' %}
{% block title %}Delete - DjanGoMarket{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-body text-center">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                    <h3 class="card-title text-danger mb-3">Delete {{ item_name }}?</h3>
                    <p class="card-text text-muted mb-4">
                        Are you sure you want to delete this item? This action cannot be undone.
                    </p>
                    <form method="POST" class="d-flex gap-2 justify-content-center">
                        {% csrf_token %}
                        <a href="{% url list_url %}" class="btn btn-secondary" style="padding: 0.5rem 1.5rem; border-radius: 8px;">
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-danger" style="padding: 0.5rem 1.5rem; border-radius: 8px;">
                            <i class="bi bi-trash me-2"></i>Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
